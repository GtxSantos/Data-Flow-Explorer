kind = "web"
previewPath = "/"
title = "Santander ETL Pipeline"
version = "1.0.0"
id = "artifacts/etl-pipeline"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23903

[services.development]
run = "pnpm --filter @workspace/etl-pipeline run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/etl-pipeline", "run", "build" ]
publicDir = "artifacts/etl-pipeline/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23903"
BASE_PATH = "/"
